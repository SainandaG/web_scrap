<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High Speed YouTube Downloader</title>
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-secondary: #94a3b8;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            margin-bottom: 2rem;
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        input[type="text"] {
            flex: 1;
            padding: 0.75rem;
            border-radius: 0.5rem;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
        }

        button {
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            border: none;
            background-color: var(--primary);
            color: white;
            cursor: pointer;
            font-weight: 600;
        }

        button:disabled {
            background-color: #475569;
        }

        .preview {
            margin-top: 1.5rem;
            display: none;
        }

        .preview img {
            width: 100%;
            border-radius: 0.5rem;
        }

        .progress-container {
            margin-top: 1.5rem;
            display: none;
        }

        .progress-bar {
            height: 10px;
            background: #334155;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s;
        }

        #status {
            margin-top: 1rem;
            color: var(--text-secondary);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>YouTube Downloader</h1>

        <div
            style="margin-bottom: 1.5rem; text-align: left; background: #334155; padding: 1rem; border-radius: 0.5rem; font-size: 0.9rem;">
            <label style="font-weight: bold; display: block; margin-bottom: 0.5rem;">Bypass Bot Detection
                (Optional)</label>
            <input type="file" id="cookieFile" accept=".txt" style="margin-bottom: 0.5rem;">
            <div style="color: #94a3b8; font-size: 0.8rem;">
                If Vercel is blocked, please upload a <b>cookies.txt</b> file exported from your browser.
            </div>
        </div>

        <div class="input-group">
            <input type="text" id="url" placeholder="Paste YouTube URL here...">
            <button id="fetchBtn">Fetch Info</button>
        </div>

        <div id="preview" class="preview">
            <img id="thumbnail" src="" alt="Thumbnail">
            <h3 id="videoTitle"></h3>
            <div class="input-group">
                <select id="resolution"
                    style="flex:1; padding:0.75rem; border-radius:0.5rem; background:#0f172a; color:white; border:1px solid #334155;">
                    <option value="Highest Quality">Highest Quality</option>
                </select>
                <button id="downloadBtn">Download</button>
            </div>
        </div>

        <div id="progressContainer" class="progress-container">
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
            <p id="status">Starting download...</p>
            <a id="fileDownloadBtn"
                style="display:none; margin-top:1rem; display:inline-block; padding:0.75rem 1.5rem; background:#10b981; color:white; border-radius:0.5rem; text-decoration:none; font-weight:bold;">📥
                Save to Device</a>
        </div>
    </div>

    <script>
        const fetchBtn = document.getElementById('fetchBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const urlInput = document.getElementById('url');
        const preview = document.getElementById('preview');
        const status = document.getElementById('status');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');

        fetchBtn.onclick = async () => {
            const url = urlInput.value;
            const cookieFile = document.getElementById('cookieFile').files[0];
            if (!url) return alert('Enter a URL');

            fetchBtn.disabled = true;
            status.innerText = 'Fetching info...';

            const formData = new FormData();
            formData.append('url', url);
            if (cookieFile) {
                formData.append('cookies', cookieFile);
            }

            try {
                const res = await fetch('/api/info', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                if (data.error) throw new Error(data.error);

                document.getElementById('thumbnail').src = data.thumbnail;
                document.getElementById('videoTitle').innerText = data.title;

                const resSelect = document.getElementById('resolution');
                resSelect.innerHTML = '';
                data.resolutions.forEach(r => {
                    const opt = document.createElement('option');
                    opt.value = r;
                    opt.innerText = r;
                    resSelect.appendChild(opt);
                });

                preview.style.display = 'block';
                status.innerText = 'Ready to download';
            } catch (err) {
                if (err.message.toLowerCase().includes('not a bot') || err.message.toLowerCase().includes('sign in')) {
                    alert("Bot Detected! Vercel is blocked by YouTube. Please use the local GUI version with the 'Auth' dropdown to download this video.");
                } else {
                    alert(err.message);
                }
            } finally {
                fetchBtn.disabled = false;
            }
        };

        downloadBtn.onclick = async () => {
            const url = urlInput.value;
            const resVal = document.getElementById('resolution').value;
            const cookieFile = document.getElementById('cookieFile').files[0];

            downloadBtn.disabled = true;
            progressContainer.style.display = 'block';

            const formData = new FormData();
            formData.append('url', url);
            formData.append('resolution', resVal);
            if (cookieFile) {
                formData.append('cookies', cookieFile);
            }

            try {
                const res = await fetch('/api/download', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                const pollProgress = setInterval(async () => {
                    const pRes = await fetch(`/api/progress/${data.video_id}`);
                    const pData = await pRes.json();
                    progressFill.style.width = pData.progress + '%';
                    status.innerText = `Downloading to server... ${Math.round(pData.progress)}%`;

                    if (pData.progress >= 100) {
                        clearInterval(pollProgress);
                        status.innerText = 'Server processing complete! You can now save the file to your device.';
                        const downloadBtn = document.getElementById('fileDownloadBtn');
                        downloadBtn.href = `/api/download_file/${data.video_id}`;
                        downloadBtn.style.display = 'inline-block';
                        document.getElementById('downloadBtn').disabled = false;
                    }
                }, 1000);
            } catch (err) {
                alert(err.message);
                downloadBtn.disabled = false;
            }
        };
    </script>
</body>

</html>
